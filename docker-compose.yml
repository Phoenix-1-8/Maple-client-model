services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maple
      POSTGRES_PASSWORD: maple
      POSTGRES_DB: maple
    ports:
      - "5432:5432"
    volumes:
      - maple_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maple"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://maple:maple@db:5432/maple
      REDIS_URL: redis://redis:6379/0
      SEED_ON_STARTUP: "true"
      # Pinned so the loaded fixture's baked dates line up with the app's
      # "as-of" date (recency weighting, trend anchoring). Matches the fixture
      # built by `make build-fixture`.
      MAPLE_AS_OF: "2026-06-11"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.workers.worker
    environment:
      DATABASE_URL: postgresql+psycopg2://maple:maple@db:5432/maple
      REDIS_URL: redis://redis:6379/0
      SEED_ON_STARTUP: "false"
      MAPLE_AS_OF: "2026-06-11"
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  maple_pgdata:
